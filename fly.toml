app = "insta-bot" # Ilovangizning nomi (fly.io dagi loyiha nomi bilan bir xil bo'lishi kerak)
primary_region = "fra" # Frankfurt (yoki o'zingizga yaqin mintaqa)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1