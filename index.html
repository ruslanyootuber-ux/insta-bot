<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Zikirmatik</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background-size: cover; background-position: center; transition: 0.5s; }
        
        /* Boshlash ekrani */
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        .btn-start { padding: 20px 40px; font-size: 20px; background: #d4af37; border: none; border-radius: 10px; cursor: pointer; }

        /* Zikirmatik dizayni */
        .counter { font-size: 60px; color: white; text-shadow: 2px 2px 10px #000; margin-top: 20px; }
        .tap-zone { width: 250px; height: 250px; cursor: pointer; margin-top: 20px; border-radius: 50%; outline: none; border: 5px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); }
        
        /* Mavzular (Themes) */
        .theme-1 { background-image: url('URL_RASM_1'); }
        .theme-2 { background-image: url('URL_RASM_2'); }
        .theme-3 { background-image: url('URL_RASM_3'); }
        .theme-4 { background-image: url('URL_RASM_4'); }
        .theme-5 { background-image: url('URL_RASM_5'); }

        .theme-selector { position: absolute; bottom: 20px; display: flex; gap: 10px; }
        .theme-btn { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="theme-1">
    <div id="start-screen">
        <button class="btn-start" onclick="startApp()">🕌 Boshlash</button>
    </div>

    <div id="app">
        <div class="counter" id="count">0</div>
        <div id="zikr-name" style="color:white; font-size: 20px;">Alhamdulillah</div>
        <button class="tap-zone" onclick="tapTasbeh()"></button>

        <div class="theme-selector">
            <button class="theme-btn" style="background:#5c6bc0" onclick="setTheme(1)"></button>
            <button class="theme-btn" style="background:#8d6e63" onclick="setTheme(2)"></button>
            <button class="theme-btn" style="background:#263238" onclick="setTheme(3)"></button>
            <button class="theme-btn" style="background:#cfd8dc" onclick="setTheme(4)"></button>
            <button class="theme-btn" style="background:#00695c" onclick="setTheme(5)"></button>
        </div>
    </div>

    <audio id="bgMusic" loop src="URL_FON_MUSIQASI.mp3"></audio>
    <audio id="soundEffect"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let count = 0, zikrIdx = 0;
        const zikrs = ["Subhanalloh", "Alhamdulillah", "Astagfirulloh"];

        function startApp() {
            document.getElementById('start-screen').style.display = 'none';
            const bg = document.getElementById('bgMusic');
            bg.volume = 0.08;
            bg.play();
        }

        function tapTasbeh() {
            count++;
            if(count > 33) { count = 1; zikrIdx = (zikrIdx + 1) % zikrs.length; }
            document.getElementById('count').innerText = count;
            document.getElementById('zikr-name').innerText = zikrs[zikrIdx];
            
            // Vibratsiya
            tg.HapticFeedback.impactOccurred('light');
            
            // Ovoz ijrosi
            const audio = document.getElementById('soundEffect');
            audio.src = `sounds/${zikrs[zikrIdx]}.mp3`; // Ovoz fayllari papkasi
            audio.play();
        }

        function setTheme(id) { document.body.className = `theme-${id}`; }
    </script>
</body>
</html>
