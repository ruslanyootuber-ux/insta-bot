<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NamozVaqti Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  padding:15px;
  transition:0.3s;
}

.dark{
  background:#0f172a;
  color:white;
}

.light{
  background:#f8fafc;
  color:black;
}

.card{
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
}

select,button{
  padding:10px;
  margin-top:8px;
  width:100%;
  border-radius:10px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🕌 NamozVaqti Pro</h2>

<div class="card">
<label>Viloyat:</label>
<select id="region" onchange="loadDistricts()"></select>

<label>Tuman:</label>
<select id="district"></select>

<button onclick="saveLocation()">📍 Saqlash</button>
</div>

<div class="card">
<h3>⏰ Namoz vaqtlari</h3>
<p id="times">Yuklanmoqda...</p>
<button onclick="loadTimes()">🔄 Yangilash</button>
</div>

<div class="card">
<button onclick="setTheme('dark')">🌙 Dark</button>
<button onclick="setTheme('light')">☀️ Light</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

const data = {
"Toshkent shahri":["Yunusobod","Chilonzor","Mirzo Ulug‘bek"],
"Toshkent viloyati":["Chirchiq","Angren"],
"Andijon":["Andijon","Asaka"],
"Farg‘ona":["Farg‘ona","Qo‘qon"],
"Namangan":["Namangan","Chust"],
"Samarqand":["Samarqand","Urgut"],
"Buxoro":["Buxoro","G‘ijduvon"],
"Navoiy":["Navoiy"],
"Qashqadaryo":["Qarshi","Shahrisabz"],
"Surxondaryo":["Termiz","Denov"],
"Jizzax":["Jizzax"],
"Sirdaryo":["Guliston"],
"Xorazm":["Urganch","Xiva"],
"Qoraqalpog‘iston":["Nukus"]
};

let region=document.getElementById("region");
let district=document.getElementById("district");

function init(){
  for(let r in data){
    let opt=document.createElement("option");
    opt.value=r;
    opt.innerText=r;
    region.appendChild(opt);
  }
  loadDistricts();

  let theme=localStorage.getItem("theme")||"dark";
  setTheme(theme);

  loadTimes();
}

function loadDistricts(){
  district.innerHTML="";
  data[region.value].forEach(d=>{
    let opt=document.createElement("option");
    opt.innerText=d;
    district.appendChild(opt);
  });
}

function saveLocation(){
  localStorage.setItem("region",region.value);
  localStorage.setItem("district",district.value);
  alert("Saqlanildi: "+region.value+" / "+district.value);
  loadTimes();
}

function setTheme(mode){
  document.body.className=mode;
  localStorage.setItem("theme",mode);
}

async function loadTimes(){
  document.getElementById("times").innerText="Yuklanmoqda...";

  let city = district.value || "Tashkent";

  try{
    let res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Uzbekistan&method=2`);
    let data = await res.json();

    let t = data.data.timings;

    document.getElementById("times").innerHTML=
    "🌅 Bomdod: "+t.Fajr+"<br>"+
    "☀️ Peshin: "+t.Dhuhr+"<br>"+
    "🌤 Asr: "+t.Asr+"<br>"+
    "🌇 Shom: "+t.Maghrib+"<br>"+
    "🌙 Xufton: "+t.Isha;

  }catch(e){
    document.getElementById("times").innerText="Xatolik API";
  }
}

init();
</script>

</body>
</html>
