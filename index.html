<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Tasbeh</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Битта асосий дизайн */
        .theme-default { 
            background: url('URL_RASM_MANZILI') center/cover no-repeat; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        
        #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        .btn-start { padding: 20px 40px; font-size: 20px; background: #d4af37; border: none; border-radius: 20px; cursor: pointer; color: white; font-weight: bold; }

        .counter { font-size: 80px; color: white; text-shadow: 2px 2px 10px #000; margin-top: 10px; }
        .zikr-text { color: #d4af37; font-size: 28px; font-weight: bold; text-shadow: 1px 1px 5px #000; margin-bottom: 10px; }
        .tap-zone { width: 220px; height: 220px; cursor: pointer; border-radius: 50%; border: 4px solid rgba(212, 175, 55, 0.5); background: rgba(0,0,0,0.3); margin: 20px; transition: 0.2s; }
        .tap-zone:active { transform: scale(0.95); }
        .btn-reset { color: #ff4757; background: none; border: 1px solid #ff4757; padding: 10px 20px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body class="theme-default">
    <div id="start-screen">
        <button class="btn-start" onclick="startApp()">🕌 TASBEHNI BOSHLASH</button>
    </div>

    <div class="zikr-text" id="zikr-name">Alhamdulillah</div>
    <div class="counter" id="count">0</div>
    <button class="tap-zone" onclick="tapTasbeh()"></button>
    <button class="btn-reset" onclick="resetCount()">🔄 Нолга тушириш</button>

    <audio id="welcomeSound" src="sounds/xush_kelibsiz.mp3"></audio>
    <audio id="bgMusic" loop src="sounds/fon_musiqa.mp3"></audio>
    <audio id="soundEffect"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let count = 0, zikrIdx = 0;
        const zikrs = ["Subhanalloh", "Alhamdulillah", "Astagfirulloh"];

        function startApp() {
            document.getElementById('welcomeSound').play();
            document.getElementById('welcomeSound').onended = () => {
                const bg = document.getElementById('bgMusic');
                bg.volume = 0.08;
                bg.play();
            };
            document.getElementById('start-screen').style.display = 'none';
        }

        function tapTasbeh() {
            count++;
            if(count > 33) { count = 1; zikrIdx = (zikrIdx + 1) % zikrs.length; }
            document.getElementById('count').innerText = count;
            document.getElementById('zikr-name').innerText = zikrs[zikrIdx];
            
            tg.HapticFeedback.impactOccurred('medium');
            
            const audio = document.getElementById('soundEffect');
            audio.src = `sounds/${zikrs[zikrIdx]}.mp3`;
            audio.play();
        }

        function resetCount() {
            count = 0;
            document.getElementById('count').innerText = count;
            tg.HapticFeedback.notificationOccurred('warning');
        }
    </script>
</body>
</html>
