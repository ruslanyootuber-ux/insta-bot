<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Islom.uz nusxasi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <div class="top-section">
            <div class="top-header">
                <h2>islom.uz ilovasi</h2>
                <div class="mail-icon"><i class="fa-regular fa-envelope"></i><span class="badge"></span></div>
            </div>
            <div class="info-timer-container">
                <div class="info-part">
                    <div class="info-item"><div class="dot active"></div><span class="day">Yakshanba, 28 Iyun</span></div>
                    <div class="line"></div>
                    <div class="info-item"><div class="dot"></div><div class="location-btn">Yakkabog'</div></div>
                </div>
                <div class="timer-part">
                    <div class="circular-progress"><div class="inner-circle"><span class="prayer-name">Bomdod</span><span class="prayer-time">03:32</span></div></div>
                </div>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-clock"></i></div><span>Namoz vaqti</span></div>
            <div class="menu-item"><div class="icon-circle"><strong>99</strong></div><span>99-ismi</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-bahai"></i></div><span>Tasbeh</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-compass"></i></div><span>Qibla</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-list-ul"></i></div><span>Zikrlar</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-calendar-days"></i></div><span>Ramazon</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-book"></i></div><span>Hadis</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-bell"></i></div><span>Eslatma</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-scale-balanced"></i></div><span>Mazhab</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-headset"></i></div><span>Bog'lanish</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-star"></i></div><span>Baholash</span></div>
            <div class="menu-item"><div class="icon-circle"><i class="fa-solid fa-share-nodes"></i></div><span>Ulashish</span></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fa-solid fa-border-all"></i><span>Asosiy</span></div>
            <div class="nav-item"><i class="fa-solid fa-globe"></i><span>islom.uz</span></div>
            <div class="nav-item"><i class="fa-solid fa-gear"></i><span>Sozlamalar</span></div>
        </div>
    </div>
</body>
</html>
