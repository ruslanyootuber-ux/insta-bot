<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultra Premium Tasbeeh</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #070a13;
            --gold-solid: #d4af37;
            --emerald-neon: #00f5d4;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --shadow-light: rgba(255, 255, 255, 0.05);
            --shadow-dark: rgba(0, 0, 0, 0.8);
        }

        body {
            margin: 0; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            background-color: var(--bg-dark); color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100vh; box-sizing: border-box; overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-frame {
            position: absolute; top: 10px; bottom: 10px; left: 10px; right: 10px;
            border: 2px solid rgba(212, 175, 55, 0.15); border-radius: 40px;
            pointer-events: none; z-index: 100; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .header { text-align: center; margin-top: 40px; z-index: 10; }
        .zikr-text {
            font-size: 28px; font-weight: 800; margin: 0;
            background: linear-gradient(135deg, #ffe082 0%, #d4af37 50%, #aa7c11 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: all 0.3s ease;
        }
        .zikr-meaning { font-size: 14px; color: #64748b; margin-top: 5px; }

        /* Марказий Прогресс ва Рақам */
        .progress-container {
            position: relative; width: 260px; height: 260px;
            display: flex; align-items: center; justify-content: center;
        }
        
        .progress-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.3s ease-out;
            stroke: var(--gold-solid); stroke-width: 8; fill: transparent;
            stroke-dasharray: 754; stroke-dashoffset: 754;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }
        .progress-ring-bg {
            stroke: rgba(255, 255, 255, 0.05); stroke-width: 8; fill: transparent;
        }

        .counter-display {
            position: absolute; width: 200px; height: 200px;
            border-radius: 50%; background: radial-gradient(circle, #1a1f2e 0%, #0d121c 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            border: 1px solid rgba(255,255,255,0.02);
        }
        .count-number { font-size: 64px; font-weight: 900; color: #ffffff; font-variant-numeric: tabular-nums; }
        .total-count { font-size: 14px; color: var(--emerald-neon); margin-top: 5px; letter-spacing: 2px; }

        /* Асосий Босиш Тугмаси */
        .tap-btn-wrapper { margin-bottom: 20px; z-index: 10; }
        .tap-btn {
            width: 140px; height: 140px; border-radius: 50%;
            background: linear-gradient(145deg, #161b27, #0b0f17);
            box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light);
            border: none; outline: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s ease;
        }
        .tap-btn:active {
            box-shadow: inset 15px 15px 30px var(--shadow-dark), inset -15px -15px 30px var(--shadow-light);
            transform: scale(0.96);
        }
        .tap-icon { font-size: 40px; filter: drop-shadow(0 0 5px var(--gold-solid)); }

        /* Пастки бошқарув (Reset) */
        .controls {
            display: flex; justify-content: center; width: 100%; margin-bottom: 30px; z-index: 10;
        }
        .reset-btn {
            background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 12px 30px; border-radius: 20px; font-size: 14px; font-weight: 700;
            cursor: pointer; backdrop-filter: blur(10px);
        }
        .reset-btn:active { background: rgba(255, 71, 87, 0.2); }
        
        .pulse { animation: glowPulse 0.5s ease-out; }
        @keyframes glowPulse {
            0% { filter: drop-shadow(0 0 10px var(--emerald-neon)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 30px var(--emerald-neon)); transform: scale(1.05); }
            100% { filter: drop-shadow(0 0 10px var(--emerald-neon)); transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="phone-frame"></div>
    
    <audio id="tapSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="completeSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="header">
        <h1 class="zikr-text" id="zikrText">Субҳаналлоҳ</h1>
        <p class="zikr-meaning" id="zikrMeaning">Аллоҳ покдир</p>
    </div>

    <div class="progress-container">
        <svg class="progress-ring" width="260" height="260">
            <circle class="progress-ring-bg" cx="130" cy="130" r="120"></circle>
            <circle class="progress-ring-circle" id="progressRing" cx="130" cy="130" r="120"></circle>
        </svg>
        <div class="counter-display" id="counterDisplay">
            <span class="count-number" id="countDisplay">0</span>
            <span class="total-count" id="totalDisplay">Жами: 0</span>
        </div>
    </div>

    <div class="tap-btn-wrapper">
        <button class="tap-btn" id="tapBtn">
            <span class="tap-icon">👆</span>
        </button>
    </div>

    <div class="controls">
        <button class="reset-btn" id="resetBtn">🔄 Янгилаш</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const tapBtn = document.getElementById('tapBtn');
        const resetBtn = document.getElementById('resetBtn');
        const countDisplay = document.getElementById('countDisplay');
        const totalDisplay = document.getElementById('totalDisplay');
        const progressRing = document.getElementById('progressRing');
        const zikrText = document.getElementById('zikrText');
        const zikrMeaning = document.getElementById('zikrMeaning');
        const counterDisplay = document.getElementById('counterDisplay');
        const tapSound = document.getElementById('tapSound');
        const completeSound = document.getElementById('completeSound');

        // Прогресс халқаси узунлиги
        const circle = progressRing;
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        // Хотирадан ўқиш ёки 0 дан бошлаш
        let totalCount = parseInt(localStorage.getItem('tasbeeh_total')) || 0;
        let currentCycleCount = totalCount % 99; 
        
        const zikrs = [
            { text: "Субҳаналлоҳ", meaning: "Аллоҳ покдир (0-33)", limit: 33 },
            { text: "Алҳамдулиллаҳ", meaning: "Аллоҳга ҳамд бўлсин (33-66)", limit: 66 },
            { text: "Аллоҳу Акбар", meaning: "Аллоҳ буюкдир (66-99)", limit: 99 }
        ];

        function updateUI() {
            currentCycleCount = totalCount % 99;
            let displayCount = currentCycleCount % 33;
            if (displayCount === 0 && currentCycleCount !== 0) displayCount = 33; // 33 да 0 бўлиб қолмаслиги учун
            
            countDisplay.innerText = totalCount === 0 ? "0" : displayCount;
            totalDisplay.innerText = `Жами: ${totalCount}`;

            // Прогресс халқасини янгилаш (33 талик цикл)
            let progress = displayCount / 33;
            if (totalCount > 0 && displayCount === 0) progress = 1;
            const offset = circumference - progress * circumference;
            circle.style.strokeDashoffset = offset;

            // Зикр матнини янгилаш
            let activeZikr = zikrs[0];
            if (currentCycleCount >= 33 && currentCycleCount < 66) activeZikr = zikrs[1];
            else if (currentCycleCount >= 66 || (totalCount > 0 && totalCount % 99 === 0)) activeZikr = zikrs[2];

            zikrText.innerText = activeZikr.text;
            zikrMeaning.innerText = activeZikr.meaning;
        }

        function vibrate(type) {
            if (tg.HapticFeedback) {
                if (type === 'light') tg.HapticFeedback.impactOccurred('light');
                if (type === 'heavy') tg.HapticFeedback.notificationOccurred('success');
            } else if (navigator.vibrate) {
                if (type === 'light') navigator.vibrate(30);
                if (type === 'heavy') navigator.vibrate([100, 50, 100]);
            }
        }

        tapBtn.addEventListener('click', () => {
            totalCount++;
            localStorage.setItem('tasbeeh_total', totalCount);
            
            currentCycleCount = totalCount % 99;
            
            // 33, 66, 99 га етганда
            if (totalCount % 33 === 0) {
                vibrate('heavy');
                completeSound.currentTime = 0;
                completeSound.play().catch(e => {});
                counterDisplay.classList.add('pulse');
                setTimeout(() => counterDisplay.classList.remove('pulse'), 500);
            } else {
                vibrate('light');
                tapSound.currentTime = 0;
                tapSound.play().catch(e => {});
            }
            
            updateUI();
        });

        resetBtn.addEventListener('click', () => {
            if (confirm('Саноқни нолга туширишни хоҳлайсизми?')) {
                totalCount = 0;
                localStorage.setItem('tasbeeh_total', 0);
                updateUI();
                vibrate('heavy');
            }
        });

        // Бошланғич ҳолатни юклаш
        updateUI();
    </script>
</body>
</html>
