<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Islamic Tasbeh</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: #d4af37; font-family: 'Georgia', serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* Исломий фон */
        .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1542816417-0983c9c9ad53?q=80&w=1000') center/cover; filter: blur(8px) brightness(0.3); z-index: -1; }

        .counter { font-size: 80px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        .zikr-name { font-size: 24px; margin-bottom: 30px; letter-spacing: 2px; }

        /* Реал тасбеҳ тасвири */
        .tasbeh-img { width: 300px; height: 300px; background: url('https://png.pngtree.com/png-vector/20231018/ourmid/pngtree-tasbih-beads-vector-png-image_10260275.png') center/contain no-repeat; transition: transform 0.1s; cursor: pointer; }
        .tasbeh-img:active { transform: scale(0.95); }

        .btn-reset { margin-top: 30px; padding: 10px 25px; background: rgba(212,175,55,0.2); border: 1px solid #d4af37; color: #fff; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="zikr-name" id="zikrText">Субҳаналлоҳ</div>
    <div class="counter" id="count">0</div>
    <div class="tasbeh-img" id="tapArea"></div>
    <button class="btn-reset" onclick="reset()">🔄 Нолга тушириш</button>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio> <audio id="audioZikr" src=""></audio>

    <script>
        const zikrs = [
            { name: "Субҳаналлоҳ", audio: "https://example.com/subhanallah.mp3" },
            { name: "Алҳамдулиллаҳ", audio: "https://example.com/alhamdulillah.mp3" },
            { name: "Астағфируллоҳ", audio: "https://example.com/astaghfirullah.mp3" }
        ];
        let count = 0, zikrIdx = 0;
        const countEl = document.getElementById('count'), zikrEl = document.getElementById('zikrText');
        
        // Фон мусиқаси
        const bg = document.getElementById('bgMusic');
        bg.volume = 0.1;
        document.body.addEventListener('click', () => bg.play(), {once: true});

        document.getElementById('tapArea').onclick = () => {
            count++;
            if(count > 33) { count = 1; zikrIdx = (zikrIdx + 1) % 3; }
            countEl.innerText = count;
            zikrEl.innerText = zikrs[zikrIdx].name;
            
            let audio = new Audio(zikrs[zikrIdx].audio);
            audio.play();
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        };

        function reset() { count = 0; countEl.innerText = 0; }
    </script>
</body>
</html>
